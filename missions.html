<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Go America! Season 2 – State Mission Map</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e8f4fd;
    --navy: #1a3a5c;
    --gold: #f5a623;
    --red: #e84040;
    --green: #3ab870;
    --stamp-done: #3ab870;
    --stamp-todo: #c8d8e8;
    --card-bg: #fff;
    --shadow: 0 4px 18px rgba(26,58,92,0.13);
  }

  /* ── NAV BAR ── */
  .navbar {
    background: #0a1828;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,255,255,.07);
    position: sticky;
    top: 0;
    z-index: 60;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,.4);
    font-family: 'Fredoka One', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    text-decoration: none;
    transition: all .2s;
    letter-spacing: .3px;
  }
  .nav-btn:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); }
  .nav-btn.active { background: var(--navy); color: #fff; }
  .nav-divider { width: 1px; height: 18px; background: rgba(255,255,255,.1); margin: 0 2px; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(255,255,255,.04) 18px,rgba(255,255,255,.04) 36px);
  }
  .header-inner { position: relative; z-index: 1; }
  .season-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Fredoka One', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 2px;
    padding: 3px 14px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Fredoka One', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    letter-spacing: 1px;
    line-height: 1.15;
  }
  header h1 span { color: var(--gold); }
  .subtitle { font-size: 0.88rem; color: rgba(255,255,255,.7); margin-top: 6px; }

  /* ── TABS ── */
  .tabs-bar {
    background: #fff;
    display: flex;
    border-bottom: 2px solid #e8f0f8;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: transparent;
    font-family: 'Fredoka One', sans-serif;
    font-size: clamp(0.82rem, 2.5vw, 1rem);
    color: #aaa;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab-btn.active {
    color: var(--navy);
    border-bottom-color: var(--gold);
  }
  .tab-btn:hover { color: var(--navy); }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: #f5faff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid #e0eaf5;
  }
  .progress-label { font-weight: 800; color: var(--navy); font-size: 0.9rem; white-space: nowrap; }
  .bar-bg { flex: 1; height: 14px; background: var(--stamp-todo); border-radius: 20px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), #7edf9a); border-radius: 20px; transition: width .6s ease; }
  .progress-count { font-family: 'Fredoka One', sans-serif; font-size: 1rem; color: var(--green); white-space: nowrap; }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── MAP SECTION ── */
  .map-section {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 14px 40px;
  }
  .section-title {
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.1rem;
    color: var(--navy);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--navy), transparent);
    border-radius: 2px;
  }

  .states-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
  }

  /* ── STATE CARD ── */
  .state-card {
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 16px 14px 14px;
    cursor: pointer;
    transition: transform .18s, box-shadow .18s;
    position: relative;
    overflow: hidden;
    border: 3px solid transparent;
    user-select: none;
  }
  .state-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(26,58,92,.18); }
  .state-card.done {
    border-color: var(--stamp-done);
    background: linear-gradient(135deg, #f0fff5, #fff);
  }
  .state-card.done::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(-45deg,transparent,transparent 12px,rgba(58,184,112,.05) 12px,rgba(58,184,112,.05) 14px);
    pointer-events: none;
  }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .state-emoji { font-size: 2.2rem; line-height: 1; }
  .stamp {
    width: 44px; height: 44px; border-radius: 50%;
    border: 3px dashed var(--stamp-todo);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; color: var(--stamp-todo);
    transition: all .3s; flex-shrink: 0;
  }
  .done .stamp {
    border-color: var(--stamp-done); background: var(--stamp-done);
    color: #fff; border-style: solid; animation: stampPop .35s ease;
  }
  @keyframes stampPop {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .state-name { font-family: 'Fredoka One', sans-serif; font-size: 1.1rem; color: var(--navy); line-height: 1.2; }
  .state-tag { font-size: 0.72rem; color: #888; margin-top: 1px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
  .mission-label {
    font-size: 0.8rem; font-weight: 700; color: var(--navy);
    background: #eef4fa; border-radius: 8px; padding: 5px 10px;
    margin-top: 10px; display: flex; align-items: center; gap: 6px;
  }
  .done .mission-label { background: #e2f8ec; color: var(--green); }
  .done-text {
    font-size: 0.7rem; font-weight: 800; color: var(--green);
    margin-top: 8px; text-align: right; letter-spacing: .5px; text-transform: uppercase;
    opacity: 0; transform: translateY(4px); transition: all .3s .1s;
  }
  .done .done-text { opacity: 1; transform: translateY(0); }

  /* ── CURRICULUM SECTION ── */
  .curriculum-section {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 14px 40px;
  }

  .curr-filter {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 2px solid #d0e4f4;
    background: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    color: #888;
    cursor: pointer;
    transition: all .18s;
  }
  .filter-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }

  .curr-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .curr-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border-left: 5px solid var(--navy);
    transition: transform .18s, box-shadow .18s;
  }
  .curr-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,58,92,.15); }

  .curr-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 10px;
    cursor: pointer;
  }
  .curr-num {
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.3rem;
    color: var(--navy);
    min-width: 28px;
    opacity: .4;
  }
  .curr-emoji { font-size: 1.8rem; }
  .curr-title-wrap { flex: 1; }
  .curr-title {
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.1rem;
    color: var(--navy);
  }
  .curr-subtitle { font-size: 0.75rem; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .curr-toggle {
    font-size: 1.2rem;
    color: #bbb;
    transition: transform .25s;
    user-select: none;
  }
  .curr-card.open .curr-toggle { transform: rotate(90deg); }

  .curr-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid #f0f6ff;
  }
  .curr-card.open .curr-body { display: block; }

  .curr-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .curr-item {
    background: #f5faff;
    border-radius: 10px;
    padding: 10px 12px;
  }
  .curr-item-label {
    font-size: 0.65rem;
    font-weight: 800;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .curr-item-val {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
  }
  .curr-words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .word-chip {
    background: var(--navy);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .curr-sentences {
    margin-top: 10px;
    background: #fffbf0;
    border-radius: 10px;
    padding: 10px 14px;
    border-left: 3px solid var(--gold);
  }
  .curr-sentences .lbl { font-size: 0.65rem; font-weight: 800; color: #cba; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .curr-sentence { font-family: 'Fredoka One', sans-serif; font-size: 1rem; color: var(--navy); margin-bottom: 2px; }

  .curr-activity {
    margin-top: 10px;
    background: #f0fff5;
    border-radius: 10px;
    padding: 10px 14px;
    border-left: 3px solid var(--green);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .curr-activity .act-icon { font-size: 1.4rem; flex-shrink: 0; }
  .curr-activity .act-body .lbl { font-size: 0.65rem; font-weight: 800; color: #8cc; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .curr-activity .act-body .val { font-weight: 700; color: var(--navy); font-size: 0.88rem; }

  .curr-result {
    margin-top: 8px;
    font-size: 0.8rem;
    color: #666;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .curr-result::before { content: '✦'; color: var(--gold); }

  /* color coding by state */
  .color-0 { border-left-color: #e84040; }
  .color-1 { border-left-color: #e84040; }
  .color-2 { border-left-color: #4a9eff; }
  .color-3 { border-left-color: #a259ff; }
  .color-4 { border-left-color: #3ab870; }
  .color-5 { border-left-color: #f5a623; }
  .color-6 { border-left-color: #4a9eff; }
  .color-7 { border-left-color: #f5a623; }
  .color-8 { border-left-color: #3ab870; }
  .color-9 { border-left-color: #e84040; }
  .color-10 { border-left-color: #a259ff; }
  .color-11 { border-left-color: #4a9eff; }

  /* ── COMPLETE BANNER ── */
  .complete-banner {
    display: none;
    background: linear-gradient(135deg, var(--navy), #24508a);
    color: #fff;
    text-align: center;
    padding: 20px;
    margin: 0 0 20px;
    border-radius: 18px;
    animation: bannerIn .5s ease;
  }
  @keyframes bannerIn { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .complete-banner.show { display: block; }
  .complete-banner h2 { font-family: 'Fredoka One', sans-serif; font-size: 1.4rem; margin-bottom: 4px; }
  .complete-banner p { font-size: 0.85rem; opacity: .8; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,30,55,.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 24px;
    max-width: 400px;
    width: 100%;
    padding: 28px 24px 24px;
    position: relative;
    animation: modalIn .25s ease;
    box-shadow: 0 16px 60px rgba(0,0,0,.22);
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes modalIn { from { transform: scale(.88) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: #f0f4f8; border: none; border-radius: 50%;
    width: 32px; height: 32px; font-size: 1rem; cursor: pointer;
    color: var(--navy); display: flex; align-items: center; justify-content: center;
  }
  .modal-emoji { font-size: 3.5rem; text-align: center; margin-bottom: 8px; }
  .modal-state-name { font-family: 'Fredoka One', sans-serif; font-size: 1.6rem; color: var(--navy); text-align: center; }
  .modal-feature { text-align: center; font-size: 0.82rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .modal-mission-box { background: #eef4fa; border-radius: 14px; padding: 14px 16px; margin-bottom: 18px; }
  .modal-mission-box .label { font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .modal-mission-box .mission { font-family: 'Fredoka One', sans-serif; font-size: 1.2rem; color: var(--navy); }
  .modal-fact { font-size: 0.85rem; color: #555; line-height: 1.6; margin-bottom: 20px; }
  .btn-complete {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: var(--navy); color: #fff;
    font-family: 'Fredoka One', sans-serif; font-size: 1.1rem; cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-complete:hover { background: #24508a; }
  .btn-complete:active { transform: scale(.97); }
  .btn-complete.done-btn { background: var(--green); }
  .btn-undo {
    width: 100%; padding: 10px; border: 2px solid #e0e8f0; border-radius: 14px;
    background: transparent; color: #999; font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all .2s;
  }
  .btn-undo:hover { color: var(--red); border-color: var(--red); }

  /* ── CONFETTI ── */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
  .confetti-piece {
    position: absolute; top: -10px; width: 10px; height: 10px;
    border-radius: 2px; animation: confettiFall linear forwards;
  }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  @media (max-width: 480px) {
    .states-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .state-card { padding: 13px 11px 11px; }
    .state-emoji { font-size: 1.9rem; }
    .stamp { width: 38px; height: 38px; font-size: 1.1rem; }
    .curr-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <a class="nav-btn" href="index.html">🗺️ Map</a>
  <div class="nav-divider"></div>
  <a class="nav-btn active" href="missions.html">🎯 Missions</a>
  <div class="nav-divider"></div>
  <a class="nav-btn" href="missions.html#curriculum" onclick="switchTabByName('curriculum')">📚 Curriculum</a>
  <div class="nav-divider"></div>
  <a class="nav-btn" href="poster.html">🖨️ Poster</a>
</nav>

<header>
  <div class="header-inner">
    <div class="season-badge">🇺🇸 SEASON 2</div>
    <h1>Let's Go <span>America!</span></h1>
    <div class="subtitle">12 State Mission Map · Stamp Collection</div>
  </div>
</header>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('map')">🗺️ Mission Map</button>
  <button class="tab-btn" onclick="switchTab('curriculum')">📚 Curriculum</button>
</div>

<!-- ═══════════════ TAB: MAP ═══════════════ -->
<div class="tab-panel active" id="tab-map">
  <div class="progress-wrap">
    <span class="progress-label">🗺️ Progress</span>
    <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    <span class="progress-count" id="progressCount">0 / 12</span>
  </div>
  <div class="map-section">
    <div class="complete-banner" id="completeBanner">
      <h2>🎉 All 12 States Complete!</h2>
      <p>Amazing job! You're a true American Explorer! 🦁</p>
    </div>
    <div class="section-title">🗺️ Your State Missions</div>
    <div class="states-grid" id="statesGrid"></div>
  </div>
</div>

<!-- ═══════════════ TAB: CURRICULUM ═══════════════ -->
<div class="tab-panel" id="tab-curriculum">
  <div class="curriculum-section">
    <div class="section-title">📚 12 State Curriculum</div>

    <div class="curr-filter">
      <button class="filter-btn active" onclick="filterCurr('all', this)">All 12</button>
      <button class="filter-btn" onclick="filterCurr('nature', this)">🌿 Nature</button>
      <button class="filter-btn" onclick="filterCurr('food', this)">🍽️ Food</button>
      <button class="filter-btn" onclick="filterCurr('science', this)">🔬 Science</button>
      <button class="filter-btn" onclick="filterCurr('culture', this)">🎭 Culture</button>
    </div>

    <div class="curr-grid" id="currGrid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-emoji" id="mEmoji"></div>
    <div class="modal-state-name" id="mName"></div>
    <div class="modal-feature" id="mFeature"></div>
    <div class="modal-mission-box">
      <div class="label">🎯 Mission</div>
      <div class="mission" id="mMission"></div>
    </div>
    <div class="modal-fact" id="mFact"></div>
    <button class="btn-complete" id="btnComplete"></button>
    <button class="btn-undo" id="btnUndo">↩ Undo stamp</button>
  </div>
</div>

<div class="confetti-container" id="confettiBox"></div>

<script>
// ══ DATA ══
const STATES = [
  { id:"arizona", name:"Arizona", emoji:"🏜️", feature:"Grand Canyon", mission:"Canyon Explorer",
    fact:"The Grand Canyon is over 1 mile deep! Geologists call it Earth's best 'history book' — each layer of rock tells a different story from millions of years ago.",
    goal:"자연 지형 이해 + 탐험 표현", words:["canyon","big","deep","rock"],
    sentences:["It's big!","Let's explore!"], activity:"장애물 코스로 협곡 탐험",
    actIcon:"🏃", result:"공간 표현 + 감탄 표현", category:"nature" },

  { id:"georgia", name:"Georgia", emoji:"🥤", feature:"Coca-Cola", mission:"Soda Lab",
    fact:"Coca-Cola was invented in Atlanta, Georgia in 1886. Today it's sold in over 200 countries!",
    goal:"음료/실험 표현", words:["soda","sweet","mix","drink"],
    sentences:["Mix it!","I like soda!"], activity:"색깔 섞기 실험",
    actIcon:"🧪", result:"원인→결과 언어 경험", category:"food" },

  { id:"michigan", name:"Michigan", emoji:"🚗", feature:"Car Industry", mission:"Build a Car",
    fact:"Detroit is called the 'Motor City.' Ford, GM, and Chrysler were all born there. The assembly line was invented here by Henry Ford.",
    goal:"탈것 이해", words:["car","wheel","go","fast"],
    sentences:["Let's go!","My car is fast!"], activity:"종이 자동차 만들기",
    actIcon:"✂️", result:"기능 설명 말하기", category:"science" },

  { id:"tennessee", name:"Tennessee", emoji:"🎸", feature:"Country Music", mission:"Band Performance",

// ══ STATE ══
let completed = (() => {
  try { return JSON.parse(localStorage.getItem('bigcat_s2') || '[]'); } catch { return []; }
})();
let activeIndex = null;

function save() { try { localStorage.setItem('bigcat_s2', JSON.stringify(completed)); } catch {} }

// ══ TABS ══
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (event && event.target) event.target.classList.add('active');
  // sync nav active state
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

function switchTabByName(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const tabBtn = [...document.querySelectorAll('.tab-btn')].find(b => b.textContent.includes(name === 'curriculum' ? 'Curriculum' : 'Mission'));
  if (tabBtn) tabBtn.classList.add('active');
}

// ── URL 파라미터로 특정 주 커리큘럼 자동 오픈 ──
function handleURLParams() {
  const params = new URLSearchParams(window.location.search);
  const stateId = params.get('state');
  const hash = window.location.hash;

  if (hash === '#curriculum' || stateId) {
    switchTabByName('curriculum');
    renderCurriculum('all');

    if (stateId) {
      // 해당 주 카드 찾아서 열기
      setTimeout(() => {
        const cards = document.querySelectorAll('.curr-card');
        cards.forEach(card => {
          const header = card.querySelector('.curr-card-header');
          const titleEl = card.querySelector('.curr-title');
          if (!titleEl) return;
          // 주 이름 매칭
          const s = STATES.find(s => s.id === stateId);
          if (s && titleEl.textContent.includes(s.name)) {
            // 다른 카드 닫기
            document.querySelectorAll('.curr-card.open').forEach(c => c.classList.remove('open'));
            card.classList.add('open');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
      }, 150);
    }
  }
}

// ══ MAP ══
function updateProgress() {
  const n = completed.length;
  const pct = Math.round((n / 12) * 100);
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = n + ' / 12';
  const banner = document.getElementById('completeBanner');
  if (n === 12) { banner.classList.add('show'); confetti(); }
  else banner.classList.remove('show');
}

function renderGrid() {
  const grid = document.getElementById('statesGrid');
  grid.innerHTML = '';
  STATES.forEach((s, i) => {
    const done = completed.includes(s.id);
    const card = document.createElement('div');
    card.className = 'state-card' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="card-top">
        <div class="state-emoji">${s.emoji}</div>
        <div class="stamp">${done ? '✓' : ''}</div>
      </div>
      <div class="state-name">${s.name}</div>
      <div class="state-tag">${s.feature}</div>
      <div class="mission-label">🎯 ${s.mission}</div>
      <div class="done-text">✓ Completed!</div>
    `;
    card.addEventListener('click', () => openModal(i));
    grid.appendChild(card);
  });
  updateProgress();
}

function openModal(i) {
  activeIndex = i;
  const s = STATES[i];
  const done = completed.includes(s.id);
  document.getElementById('mEmoji').textContent = s.emoji;
  document.getElementById('mName').textContent = s.name;
  document.getElementById('mFeature').textContent = s.feature;
  document.getElementById('mMission').textContent = s.mission;
  document.getElementById('mFact').textContent = s.fact;
  const btn = document.getElementById('btnComplete');
  const undo = document.getElementById('btnUndo');
  if (done) {
    btn.textContent = '✅ Mission Done!';
    btn.className = 'btn-complete done-btn';
    undo.style.display = 'block';
  } else {
    btn.textContent = '🎯 Complete Mission!';
    btn.className = 'btn-complete';
    undo.style.display = 'none';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  activeIndex = null;
}

document.getElementById('btnComplete').addEventListener('click', () => {
  if (activeIndex === null) return;
  const s = STATES[activeIndex];
  if (!completed.includes(s.id)) {
    completed.push(s.id);
    save(); renderGrid(); openModal(activeIndex); confettiSmall();
  }
});
document.getElementById('btnUndo').addEventListener('click', () => {
  if (activeIndex === null) return;
  completed = completed.filter(id => id !== STATES[activeIndex].id);
  save(); renderGrid(); openModal(activeIndex);
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ══ CURRICULUM ══
let currentFilter = 'all';

function renderCurriculum(filter) {
  const grid = document.getElementById('currGrid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? STATES : STATES.filter(s => s.category === filter);
  filtered.forEach((s, i) => {
    const realIdx = STATES.indexOf(s);
    const card = document.createElement('div');
    card.className = `curr-card color-${realIdx}`;
    card.dataset.category = s.category;
    card.innerHTML = `
      <div class="curr-card-header" onclick="toggleCurr(this)">
        <div class="curr-num">${String(realIdx+1).padStart(2,'0')}</div>
        <div class="curr-emoji">${s.emoji}</div>
        <div class="curr-title-wrap">
          <div class="curr-title">${s.name} – ${s.mission}</div>
          <div class="curr-subtitle">${s.feature} · ${s.category}</div>
        </div>
        <div class="curr-toggle">›</div>
      </div>
      <div class="curr-body">
        <div class="curr-row">
          <div class="curr-item">
            <div class="curr-item-label">🎯 목표</div>
            <div class="curr-item-val">${s.goal}</div>
          </div>
          <div class="curr-item">
            <div class="curr-item-label">📖 핵심 단어</div>
            <div class="curr-words">${s.words.map(w=>`<span class="word-chip">${w}</span>`).join('')}</div>
          </div>
        </div>
        <div class="curr-sentences">
          <div class="lbl">💬 핵심 문장</div>
          ${s.sentences.map(sen=>`<div class="curr-sentence">"${sen}"</div>`).join('')}
        </div>
        <div class="curr-activity">
          <div class="act-icon">${s.actIcon}</div>
          <div class="act-body">
            <div class="lbl">🎮 액티비티</div>
            <div class="val">${s.activity}</div>
          </div>
        </div>
        <div class="curr-result">수업 결과: ${s.result}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleCurr(header) {
  const card = header.parentElement;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.curr-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function filterCurr(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCurriculum(filter);
}

// ══ CONFETTI ══
function confettiSmall() {
  const box = document.getElementById('confettiBox');
  const colors = ['#f5a623','#3ab870','#e84040','#4a9eff','#a259ff'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.5}s;animation-delay:${Math.random()*.4}s;`;
    box.appendChild(p);
    setTimeout(()=>p.remove(), 3000);
  }
}
function confetti() {
  const box = document.getElementById('confettiBox');
  const colors = ['#f5a623','#3ab870','#e84040','#4a9eff','#a259ff','#ff6eb4'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${7+Math.random()*10}px;height:${7+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;`;
      box.appendChild(p);
      setTimeout(()=>p.remove(), 5000);
    }, i * 40);
  }
}

// ══ INIT ══
renderGrid();
renderCurriculum('all');
handleURLParams();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>울림티쳐</title>
<style>
:root{
  --bg:#fff;--surface:#f7f7f7;--surface2:#f0f0f0;
  --border:#e8e8e8;--border2:#d8d8d8;
  --text:#111;--muted:#999;--muted2:#bbb;
  --accent:#111;--red:#f43f5e;--nav-h:62px;
  --track:#6366f1;--video:#ef4444;--plan:#10b981;
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;overscroll-behavior:none}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}

/* 헤더 */
.hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:80}
.hdLogoText{font-size:18px;font-weight:900;letter-spacing:-.5px;cursor:pointer}
.hdLogoSub{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hdRight{display:flex;gap:2px}
.hdBtn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:19px;border-radius:10px;transition:background .12s}
.hdBtn:hover{background:var(--surface)}

/* 하단 내비 */
.nav{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);z-index:80;padding:6px 0 env(safe-area-inset-bottom,6px)}
.navItem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 4px;color:var(--muted2);font-size:9px;font-weight:700;transition:color .12s}
.navItem.on{color:var(--text)}
.navIcon{font-size:21px;line-height:1}

/* 섹션 */
.sec{padding:20px 20px 140px}
.secTitle{font-size:20px;font-weight:900;margin-bottom:16px;letter-spacing:-.5px}
.secLabel{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}

/* 과목 그리드 */
.subjGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.subjBtn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;transition:all .15s}
.subjBtn:active{transform:scale(.96)}
.sbjIcon{font-size:22px}
.sbjName{font-size:10px;font-weight:700;color:var(--text)}

/* 프로그램 */
.progGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.progCard{display:flex;align-items:center;gap:12px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .12s}
.progCard:hover{border-color:var(--border2)}
.progCard:active{transform:scale(.97)}

/* 호수/연령 */
.issueGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stepGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.issueBtn,.stepBtn{padding:12px 4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;text-align:center;transition:all .12s}
.issueBtn:hover,.stepBtn:hover{border-color:var(--border2)}
.issueBtn:active,.stepBtn:active{transform:scale(.96)}
.issueBig{font-size:16px;font-weight:900}
.issueSm{font-size:10px;color:var(--muted);margin-top:2px}

/* Pills */
.pillRow{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pillRow::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;white-space:nowrap;transition:all .12s;flex-shrink:0}
.pill.on{background:var(--text);border-color:var(--text);color:#fff}

/* 트랙 */
.trackItem{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:all .15s}
.trackItem.on{background:var(--text);border-color:var(--text)}
.trackItem:active{transform:scale(.98)}
.tPlay{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--text);color:#fff;font-size:13px;flex-shrink:0}
.trackItem.on .tPlay{background:#fff;color:var(--text)}
.tInfo{flex:1;min-width:0}
.tTitle{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trackItem.on .tTitle{color:#fff}
.tMeta{font-size:10px;color:var(--muted);margin-top:2px}
.trackItem.on .tMeta{color:rgba(255,255,255,.55)}
.favBtn{font-size:18px;padding:8px;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center;color:var(--muted2)}
.favBtn.on{color:var(--red)}
.trackItem.on .favBtn{color:rgba(255,255,255,.4)}
.trackItem.on .favBtn.on{color:#f9a8d4}

/* 미디어 카드 */
.mediaCard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:12px}
.mediaCard:hover{border-color:var(--border2)}
.mediaCard:active{transform:scale(.98)}
.mediaIcon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mediaIcon.v{background:rgba(239,68,68,.1);color:var(--video)}
.mediaIcon.p{background:rgba(16,185,129,.1);color:var(--plan)}
.mediaTitle{font-size:12px;font-weight:700;margin-bottom:3px}
.mediaTag{font-size:9px;font-weight:700;color:var(--muted)}
.noUrl{color:var(--video);margin-left:4px}

/* 공지 */
.noticeCard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;cursor:pointer}
.pinBadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:#fef3c7;color:#d97706;border-radius:20px;font-size:9px;font-weight:700;margin-bottom:5px}
.noticeTitle{font-size:13px;font-weight:700;margin-bottom:3px}
.noticeMeta{font-size:10px;color:var(--muted)}
.noticeBody{font-size:12px;color:#555;margin-top:6px;line-height:1.6}
.homeBanner{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:12px;border-left:3px solid #fbbf24;cursor:pointer}

/* 미니 플레이어 */
.miniPlayer{position:fixed;bottom:calc(var(--nav-h) + 6px);left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:452px;background:var(--text);color:#fff;border-radius:14px;padding:10px 14px 8px;z-index:79;box-shadow:0 8px 32px rgba(0,0,0,.2);display:none}
.mpRow{display:flex;align-items:center;gap:10px}
.mpPlayBtn{width:40px;height:40px;border-radius:50%;background:#fff;color:var(--text);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.mpInfo{flex:1;min-width:0}
.mpTitle{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mpMeta{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.mpActions{display:flex;align-items:center}
.mpBtn{color:rgba(255,255,255,.45);font-size:17px;padding:6px;display:flex;align-items:center;justify-content:center}
.mpBtn.on{color:#fff}
.mpProgress{height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:8px;cursor:pointer}
.mpProgressFill{height:100%;background:#fff;border-radius:2px;transition:width .8s linear;pointer-events:none}
.mpVol{display:flex;align-items:center;gap:6px;margin-top:6px}
.mpVolIcon{font-size:12px;color:rgba(255,255,255,.4)}
.mpVolBar{flex:1;height:2px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer}
.mpVolFill{height:100%;border-radius:2px;background:rgba(255,255,255,.5);pointer-events:none}

/* 행사 */
.evCard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:12px}
.evCard:hover{border-color:var(--border2)}
.evCard:active{transform:scale(.98)}
.evBanner{border-radius:14px;padding:20px;margin-bottom:14px;color:#fff}
.subEvCard{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s}
.subEvCard:hover{border-color:var(--border2)}
.subEvCard:active{transform:scale(.98)}

/* 뒤로 */
.backBtn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--text);padding:2px 0;margin-bottom:14px}

/* 퀵 */
.quickRow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.quickMore{font-size:11px;font-weight:700;color:var(--muted)}

/* 빈 */
.empty{text-align:center;padding:40px 20px;color:var(--muted2)}
.emptyIcon{font-size:40px;margin-bottom:10px}
.emptyText{font-size:13px;font-weight:600}
.emptyDesc{font-size:11px;margin-top:4px}

/* 구분선 */
.divider{height:1px;background:var(--border);margin:16px 0}

/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;border-top:1px solid var(--border)}
.modalTitle{font-size:16px;font-weight:800;margin-bottom:4px}

/* 스크롤바 숨김 */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div id="app">
  <div class="hd" id="mainHd">
    <div onclick="goPage('home')" style="cursor:pointer">
      <div class="hdLogoText">울림티쳐</div>
      <div class="hdLogoSub">Wollim Teacher</div>
    </div>
    <div class="hdRight">
      <button class="hdBtn" title="검색" onclick="doSearch()">🔍</button>
      <a href="./admin.html"><button class="hdBtn" title="어드민">⚙</button></a>
    </div>
  </div>

  <div id="main"></div>

  <nav class="nav">
    <button class="navItem on" id="nav-home"      onclick="goPage('home')"><span class="navIcon">⌂</span><span>홈</span></button>
    <button class="navItem"    id="nav-subjects"  onclick="goPage('subjects')"><span class="navIcon">▤</span><span>과목</span></button>
    <button class="navItem"    id="nav-favorites" onclick="goPage('favorites')"><span class="navIcon">★</span><span>즐겨찾기</span></button>
    <button class="navItem"    id="nav-recent"    onclick="goPage('recent')"><span class="navIcon">🕐</span><span>최근</span></button>
    <button class="navItem"    id="nav-events"    onclick="goPage('events')"><span class="navIcon">🎪</span><span>행사</span></button>
  </nav>

  <!-- 미니 플레이어 -->
  <div class="miniPlayer" id="miniPlayer">
    <div class="mpRow">
      <button class="mpPlayBtn" onclick="togglePlay()">▶</button>
      <div class="mpInfo">
        <div class="mpTitle" id="mpTitle">-</div>
        <div class="mpMeta" id="mpMeta"></div>
      </div>
      <div class="mpActions">
        <button class="mpBtn" id="mpRepeat" onclick="toggleRepeat()" title="반복">↻</button>
        <button class="mpBtn" id="mpFav"    onclick="toggleFavPlaying()">♡</button>
        <button class="mpBtn"               onclick="stopPlayer()">✕</button>
      </div>
    </div>
    <div class="mpProgress" onclick="seekProg(event)" id="mpProg">
      <div class="mpProgressFill" id="mpFill" style="width:0%"></div>
    </div>
    <div class="mpVol">
      <span class="mpVolIcon" id="mpVolIco">🔊</span>
      <div class="mpVolBar" onclick="seekVol(event)" id="mpVolBar"><div class="mpVolFill" id="mpVolFill" style="width:80%"></div></div>
      <span style="font-size:10px;color:rgba(255,255,255,.4)" id="mpVolPct">80%</span>
    </div>
  </div>

  <!-- 공지 모달 -->
  <div class="overlay" id="noticeModal" style="display:none" onclick="closeNoticeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modalTitle" id="nmTitle"></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:12px" id="nmMeta"></div>
      <div class="divider" style="margin-top:0"></div>
      <div class="noticeBody" id="nmBody"></div>
    </div>
  </div>

  <!-- 미리보기 모달 -->
  <div class="overlay" id="pvModal" style="display:none" onclick="closePv()">
    <div class="modal" style="padding:0;overflow:hidden" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--border)">
        <div style="font-size:13px;font-weight:700" id="pvTitle"></div>
        <button onclick="closePv()" style="font-size:20px;color:var(--muted);padding:4px">✕</button>
      </div>
      <div id="pvBody" style="max-height:60vh;overflow-y:auto"></div>
    </div>
  </div>
</div>

// AUDIO
// ══════════════════════════════════════════════
const pd=d=>{if(!d)return 180;const p=d.split(':').map(Number);return p.length===2?p[0]*60+p[1]:180};

function playTrack(t){
  if(typeof t==='string')t=JSON.parse(t);
  if(playing?.id===t.id){togglePlay();return;}
  if(aud){aud.pause();aud=null;}
  clearInterval(timer);
  playing=t;isPlay=true;prog=0;
  recent=[{track:t,ts:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})},...recent.filter(r=>r.track.id!==t.id)].slice(0,50);
  saveRecent();
  const url=gl(t.id,'trackUrl')||t.fileUrl||'';
  if(url){
    aud=new Audio(url);aud.volume=vol/100;
    aud.play().catch(()=>{});
    aud.onended=()=>{if(repeat){aud.currentTime=0;aud.play();}else{isPlay=false;prog=100;upMP();render();}};
  }
  const total=pd(t.duration);
  timer=setInterval(()=>{
    if(!isPlay)return;
    prog=Math.min(100,prog+100/total);
    const f=document.getElementById('mpFill');if(f)f.style.width=prog+'%';
    if(prog>=100)clearInterval(timer);
  },1000);
  upMP();render();
}

function togglePlay(){
  if(!playing)return;
  isPlay=!isPlay;
  if(aud){isPlay?aud.play():aud.pause();}
  upMP();render();
}
function stopPlayer(){
  if(aud){aud.pause();aud=null;}
  clearInterval(timer);
  playing=null;isPlay=false;prog=0;
  document.getElementById('miniPlayer').style.display='none';
  render();
}
function toggleRepeat(){repeat=!repeat;upMP();}
function toggleFavPlaying(){if(!playing)return;toggleFav(playing.id);upMP();}
function seekProg(e){
  const el=document.getElementById('mpProg');if(!el)return;
  const r=el.getBoundingClientRect();
  prog=Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100));
  if(aud&&playing)aud.currentTime=(prog/100)*pd(playing.duration);
  const f=document.getElementById('mpFill');if(f)f.style.width=prog+'%';
}
function seekVol(e){
  const el=document.getElementById('mpVolBar');if(!el)return;
  const r=el.getBoundingClientRect();
  vol=Math.round(Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100)));
  if(aud)aud.volume=vol/100;upMP();
}
function upMP(){
  const mp=document.getElementById('miniPlayer');
  if(!playing){mp.style.display='none';return;}
  mp.style.display='block';
  const fav=favs.includes(playing.id);
  const si=SUBJECTS.find(s=>s.id===playing._subj);
  document.getElementById('mpTitle').textContent=playing.title;
  document.getElementById('mpMeta').textContent=(si?si.name+' · ':'')+( playing.duration||'')+( repeat?' · 반복':'');
  document.querySelector('.mpPlayBtn').textContent=isPlay?'❚❚':'▶';
  document.getElementById('mpRepeat').style.color=repeat?'#fff':'rgba(255,255,255,.4)';
  document.getElementById('mpFav').textContent=fav?'♥':'♡';
  document.getElementById('mpFav').style.color=fav?'#f9a8d4':'rgba(255,255,255,.4)';
  document.getElementById('mpFill').style.width=prog+'%';
  document.getElementById('mpVolFill').style.width=vol+'%';
  document.getElementById('mpVolPct').textContent=vol+'%';
  document.getElementById('mpVolIco').textContent=vol===0?'🔇':vol<50?'🔉':'🔊';
}

// FAVS
// ══════════════════════════════════════════════
function toggleFav(id){
  if(favs.includes(id))favs=favs.filter(f=>f!==id);else favs.push(id);
  saveFavs();render();
}

// ══════════════════════════════════════════════
// PREVIEW
// ══════════════════════════════════════════════
function openPv(id,type,title){
  const url=gl(id,type);
  if(!url){alert('링크가 등록되지 않았습니다.\n어드민(⚙)에서 URL을 등록해주세요.');return;}
  document.getElementById('pvTitle').textContent=title;
  let h='';
  if(type==='videoUrl'){
    const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
    if(m)h=`<div style="position:relative;padding-top:56.25%"><iframe src="https://www.youtube.com/embed/${m[1]}" style="position:absolute;inset:0;width:100%;height:100%;border:none" allowfullscreen></iframe></div>`;
    else h=`<div style="padding:20px;text-align:center"><a href="${url}" target="_blank" style="color:#3b82f6;font-size:13px">영상 열기 →</a></div>`;
  } else if(type==='trackUrl'){
    const isAud=/\.(mp3|wav|ogg|m4a|aac)/i.test(url)||url.includes('cloudinary');
    if(isAud)h=`<div style="padding:16px"><audio controls src="${url}" style="width:100%"></audio></div>`;
    else h=`<div style="padding:20px;text-align:center"><a href="${url}" target="_blank" style="color:#3b82f6;font-size:13px">음원 열기 →</a></div>`;
  } else {
    const isGD=url.includes('docs.google.com')||url.includes('drive.google.com');
    if(isGD){const eu=url.replace(/\/(view|edit)(\?.*)?$/,'/preview');h=`<iframe src="${eu}" style="width:100%;height:420px;border:none"></iframe>`;}
    else if(/\.pdf/i.test(url))h=`<iframe src="${url}" style="width:100%;height:420px;border:none"></iframe>`;
    else h=`<div style="padding:20px;text-align:center"><a href="${url}" target="_blank" style="color:#3b82f6;font-size:13px">계획안 열기 →</a></div>`;
  }
  document.getElementById('pvBody').innerHTML=h;
  document.getElementById('pvModal').style.display='flex';
}
function closePv(){document.getElementById('pvModal').style.display='none';}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goPage(p){
  page=p;selSubj=null;selProg=null;selIssue=null;selStep=null;selEv=null;selSubEv=null;
  ['home','subjects','favorites','recent','events'].forEach(n=>{
    document.getElementById('nav-'+n).classList.toggle('on',n===p);
  });
  render();
}
function doSearch(){const q=prompt('검색어');if(q)alert('"'+q+'" 검색 — 추후 업데이트 예정');}

// ══════════════════════════════════════════════
// HTML HELPERS
// ══════════════════════════════════════════════
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function trkH(t){
  const on=playing?.id===t.id,pl=on&&isPlay,fav=favs.includes(t.id);
  const noUrl=!hl(t.id,'trackUrl')&&!t.fileUrl;
  const ts=JSON.stringify(t).replace(/"/g,'&quot;');
  return`<div class="trackItem${on?' on':''}" onclick="playTrack('${ts.replace(/'/g,"&#39;")}')">
    <div class="tPlay">${pl?'❚❚':'▶'}</div>
    <div class="tInfo">
      <div class="tTitle">${esc(t.title)}</div>
      <div class="tMeta">${t.duration||''}${noUrl?' · 링크 미등록':''}</div>
    </div>
    <button class="favBtn${fav?' on':''}" onclick="event.stopPropagation();toggleFav('${t.id}')">${fav?'♥':'♡'}</button>
  </div>`;
}

function vidH(v){
  return`<div class="mediaCard" onclick="openPv('${v.id}','videoUrl','${esc(v.title)}')">
    <div class="mediaIcon v">▶</div>
    <div><div class="mediaTitle">${esc(v.title)}</div>
    <div class="mediaTag">영상 · ${v.duration||''}${!hl(v.id,'videoUrl')?'<span class="noUrl"> · 링크 미등록</span>':''}</div></div>
  </div>`;
}

function plnH(p){
  return`<div class="mediaCard" onclick="openPv('${p.id}','planUrl','${esc(p.title)}')">
    <div class="mediaIcon p">📋</div>
    <div><div class="mediaTitle">${esc(p.title)}</div>
    <div class="mediaTag">계획안${!hl(p.id,'planUrl')?'<span class="noUrl"> · 링크 미등록</span>':''}</div></div>
  </div>`;
}

function backH(lbl,fn){return`<button class="backBtn" onclick="${fn}">← ${esc(lbl)}</button>`;}
function tabH(tab){return`<div class="pillRow"><button class="pill${tab==='tracks'?' on':''}" onclick="subjTab='tracks';render()">음원</button><button class="pill${tab==='videos'?' on':''}" onclick="subjTab='videos';render()">영상</button><button class="pill${tab==='plans'?' on':''}" onclick="subjTab='plans';render()">계획안</button></div>`;}

function evCon(src){
  let h='';
  if(src.tracks?.length){h+=`<div style="font-size:10px;font-weight:700;color:#6366f1;letter-spacing:1px;margin-bottom:8px">♫ 음원</div>`;src.tracks.forEach(t=>{h+=trkH({...t,_subj:'event'});});}
  if(src.videos?.length){h+=`<div style="font-size:10px;font-weight:700;color:#ef4444;letter-spacing:1px;margin:12px 0 8px">▶ 영상</div>`;src.videos.forEach(v=>{h+=vidH(v);});}
  if(src.plans?.length){h+=`<div style="font-size:10px;font-weight:700;color:#10b981;letter-spacing:1px;margin:12px 0 8px">📋 계획안</div>`;src.plans.forEach(p=>{h+=plnH(p);});}
  return h||`<div class="empty"><div class="emptyText">자료 없음</div></div>`;
}

function allTracks(){
  const res=[];
  Object.entries(CONTENT).forEach(([subj,sd])=>{
    const hp=PROGRAMS[subj];
    if(hp){Object.entries(sd).forEach(([prog,iss])=>{Object.entries(iss).forEach(([issue,steps])=>{Object.entries(steps).forEach(([step,d])=>{(d.tracks||[]).forEach(t=>res.push({...t,_subj:subj}));});});});}
    else{Object.entries(sd).forEach(([iss,steps])=>{Object.entries(steps).forEach(([step,d])=>{(d.tracks||[]).forEach(t=>res.push({...t,_subj:subj}));});});}
  });
  return res;
}

// ══════════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════════
function pgHome(){
  const pin=notices.filter(n=>n.pinned);
  let h=`<div class="sec">`;
  pin.forEach(n=>{h+=`<div class="homeBanner" onclick="openNotice(${n.id})"><div class="pinBadge">📌 공지</div><div style="font-size:13px;font-weight:700;margin-top:2px">${esc(n.title)}</div><div style="font-size:10px;color:var(--muted);margin-top:3px">${n.date}</div></div>`;});

  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="secTitle" style="margin-bottom:0">과목 바로가기</div><button class="quickMore" onclick="goPage('subjects')">전체보기</button></div>`;
  h+=`<div class="subjGrid">`;
  SUBJECTS.slice(0,8).forEach(s=>{
    h+=`<button class="subjBtn" onclick="selSubj='${s.id}';selProg=null;selIssue=null;selStep=null;page='subjects';render();['home','subjects','favorites','recent','events'].forEach(n=>document.getElementById('nav-'+n).classList.toggle('on',n==='subjects'))">
      <span class="sbjIcon">${s.icon}</span><span class="sbjName">${s.name}</span>
    </button>`;
  });
  h+=`</div>`;

  if(notices.length){
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:16px;font-weight:800">최신 공지</div></div>`;
    notices.slice(0,3).forEach(n=>{h+=`<div class="noticeCard" onclick="openNotice(${n.id})">${n.pinned?'<div class="pinBadge">📌 고정</div>':''}<div class="noticeTitle">${esc(n.title)}</div><div class="noticeMeta">${n.date}</div></div>`;});
    h+=`<div class="divider"></div>`;
  }

  const favTrks=allTracks().filter(t=>favs.includes(t.id));
  if(favTrks.length){
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:16px;font-weight:800">즐겨찾기</div><button class="quickMore" onclick="goPage('favorites')">전체보기</button></div>`;
    favTrks.slice(0,3).forEach(t=>{h+=trkH(t);});
    h+=`<div class="divider"></div>`;
  }

  if(recent.length){
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:16px;font-weight:800">최근 재생</div><button class="quickMore" onclick="goPage('recent')">전체보기</button></div>`;
    recent.slice(0,3).forEach(({track})=>{h+=trkH(track);});
  }
  h+=`</div>`;
  return h;
}

function pgSubjects(){
  if(!selSubj){
    let h=`<div class="sec"><div class="secTitle">과목</div><div class="subjGrid">`;
    SUBJECTS.forEach(s=>{h+=`<button class="subjBtn" onclick="selSubj='${s.id}';selProg=null;selIssue=null;selStep=null;render()"><span class="sbjIcon">${s.icon}</span><span class="sbjName">${s.name}</span></button>`;});
    h+=`</div></div>`;
    return h;
  }
  const si=SUBJECTS.find(s=>s.id===selSubj);
  const hp=PROGRAMS[selSubj];

  if(hp&&!selProg){
    if(hp.length===1){selProg=hp[0].id;return pgSubjects();}
    let h=`<div class="sec">${backH('과목','selSubj=null;render()')}<div class="secTitle">${si.icon} ${si.name}</div><div class="progGrid">`;
    hp.forEach(p=>{h+=`<div class="progCard" onclick="selProg='${p.id}';selIssue=null;selStep=null;render()"><span style="font-size:28px">${p.icon}</span><div><div style="font-size:13px;font-weight:700">${esc(p.name)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(p.desc||'')}</div></div></div>`;});
    h+=`</div></div>`;
    return h;
  }

  const pi=hp?hp.find(p=>p.id===selProg):null;

  if(!selIssue){
    let h=`<div class="sec">${backH(pi?pi.name:si.name,pi?'selProg=null;selIssue=null;render()':'selSubj=null;render()')}<div class="secTitle">${pi?pi.icon+' '+pi.name:si.icon+' '+si.name}</div><div class="secLabel">호수 선택</div><div class="issueGrid">`;
    ISSUES.forEach(iss=>{h+=`<button class="issueBtn" onclick="selIssue=${iss.id};selStep=null;render()"><div class="issueBig">${iss.id}</div><div class="issueSm">${iss.label}</div></button>`;});
    h+=`</div></div>`;
    return h;
  }

  if(!selStep){
    let h=`<div class="sec">${backH(selIssue+'호','selIssue=null;render()')}<div class="secTitle">${selIssue}호 · 연령 선택</div><div class="stepGrid">`;
    STEPS.forEach(s=>{h+=`<button class="stepBtn" onclick="selStep='${s.id}';subjTab='tracks';render()"><div style="font-size:15px;font-weight:900">${s.label}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${s.age}</div></button>`;});
    h+=`</div></div>`;
    return h;
  }

  const d=hp&&selProg?CONTENT[selSubj]?.[selProg]?.[selIssue]?.[selStep]:CONTENT[selSubj]?.[selIssue]?.[selStep];
  const sti=STEPS.find(s=>s.id===selStep);
  let h=`<div class="sec">${backH(selIssue+'호','selStep=null;render()')}<div class="secTitle">${selIssue}호 · ${sti.label}</div>${tabH(subjTab)}`;

  if(!d){h+=`<div class="empty"><div class="emptyIcon">📂</div><div class="emptyText">콘텐츠가 없습니다</div></div>`;}
  else if(subjTab==='tracks'){const its=d.tracks||[];h+=its.length?its.map(t=>trkH({...t,_subj:selSubj})).join(''):`<div class="empty"><div class="emptyText">등록된 음원이 없습니다</div></div>`;}
  else if(subjTab==='videos'){const its=d.videos||[];h+=its.length?its.map(v=>vidH(v)).join(''):`<div class="empty"><div class="emptyText">등록된 영상이 없습니다</div></div>`;}
  else{const its=d.plans||[];h+=its.length?its.map(p=>plnH(p)).join(''):`<div class="empty"><div class="emptyText">등록된 계획안이 없습니다</div></div>`;}
  h+=`</div>`;
  return h;
}

function pgFavorites(){
  const favTrks=allTracks().filter(t=>favs.includes(t.id));
  let h=`<div class="sec"><div class="secTitle">즐겨찾기</div>`;
  if(!favTrks.length)h+=`<div class="empty"><div class="emptyIcon">★</div><div class="emptyText">즐겨찾기한 음원이 없습니다</div><div class="emptyDesc">음원 목록에서 ♡를 눌러 추가하세요</div></div>`;
  else h+=`<div style="font-size:12px;color:var(--muted);margin-bottom:14px">${favTrks.length}곡</div>`+favTrks.map(t=>trkH(t)).join('');
  h+=`</div>`;
  return h;
}

function pgRecent(){
  let h=`<div class="sec"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div class="secTitle" style="margin-bottom:0">최근 재생</div>${recent.length?`<button style="font-size:12px;font-weight:700;color:var(--muted)" onclick="recent=[];saveRecent();render()">기록 삭제</button>`:''}</div>`;
  if(!recent.length)h+=`<div class="empty"><div class="emptyIcon">🕐</div><div class="emptyText">재생 기록이 없습니다</div></div>`;
  else h+=recent.map(({track,ts})=>{
    const on=playing?.id===track.id,pl=on&&isPlay,fav=favs.includes(track.id);
    const ts2=JSON.stringify(track).replace(/"/g,'&quot;');
    return`<div class="trackItem${on?' on':''}" onclick="playTrack('${ts2.replace(/'/g,"&#39;")}')">
      <div class="tPlay">${pl?'❚❚':'▶'}</div>
      <div class="tInfo"><div class="tTitle">${esc(track.title)}</div>
      <div class="tMeta">${track._subj?SUBJECTS.find(s=>s.id===track._subj)?.name+' · ':''} ${ts}</div></div>
      <button class="favBtn${fav?' on':''}" onclick="event.stopPropagation();toggleFav('${track.id}')">${fav?'♥':'♡'}</button>
    </div>`;
  }).join('');
  h+=`</div>`;
  return h;
}

function pgEvents(){
  if(selEv&&selSubEv){
    const ev=selEv,se=selSubEv;
    return`<div class="sec">${backH(ev.title,'selSubEv=null;render()')}<div class="evBanner" style="background:${ev.themeColor||'#333'}"><div style="font-size:40px;margin-bottom:8px">${se.emoji}</div><div style="font-size:20px;font-weight:900">${esc(se.title)}</div><div style="font-size:11px;opacity:.7;margin-top:4px">${esc(ev.title)}</div></div>${evCon(se)}</div>`;
  }
  if(selEv){
    const ev=selEv,hasSub=ev.subEvents?.length;
    const evs=JSON.stringify(ev).replace(/"/g,'&quot;');
    let h=`<div class="sec">${backH('행사','selEv=null;render()')}<div class="evBanner" style="background:${ev.themeColor||'#333'}"><div style="font-size:40px;margin-bottom:8px">${ev.icon}</div><div style="font-size:20px;font-weight:900">${esc(ev.title)}</div><div style="font-size:11px;opacity:.7;margin-top:4px">${ev.date}</div></div>`;
    if(hasSub){
      h+=`<div class="secLabel">세부 행사</div>`;
      ev.subEvents.forEach(se=>{
        const ses=JSON.stringify(se).replace(/"/g,'&quot;');
        h+=`<div class="subEvCard" onclick="selSubEv=JSON.parse(atob('${btoa(unescape(encodeURIComponent(JSON.stringify(se))))}'));render()"><span style="font-size:24px">${se.emoji}</span><div style="flex:1"><div style="font-size:13px;font-weight:700">${esc(se.title)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${(se.tracks?.length||0)}곡 · ${(se.videos?.length||0)}영상 · ${(se.plans?.length||0)}계획안</div></div><span style="color:var(--muted2)">›</span></div>`;
      });
      h+=`<div class="divider"></div><div class="secLabel">공통 자료</div>${evCon(ev)}`;
    } else {h+=evCon(ev);}
    h+=`</div>`;
    return h;
  }

  let h=`<div class="sec"><div class="secTitle">행사</div>`,any=false;
  SUBJECTS.forEach(s=>{
    const evList=EVENTS[s.id];if(!evList?.length)return;
    any=true;
    h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;margin-top:4px">${s.icon} ${s.name}</div>`;
    evList.forEach(ev=>{
      const hasSub=ev.subEvents?.length;
      const cnt=hasSub?ev.subEvents.length+'개 세부 행사':[(ev.tracks?.length||0)+'곡',(ev.videos?.length||0)+'영상'].join(' · ');
      const evB64=btoa(unescape(encodeURIComponent(JSON.stringify(ev))));
      h+=`<div class="evCard" onclick="selEv=JSON.parse(decodeURIComponent(escape(atob('${evB64}'))));selSubEv=null;render()">
        <div style="width:44px;height:44px;border-radius:10px;background:${ev.themeColor||'#333'}22;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${ev.icon}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${esc(ev.title)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(ev.date)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:1px">${cnt}</div></div>
        <span style="color:var(--muted2);font-size:16px">›</span>
      </div>`;
    });
  });
  if(!any)h+=`<div class="empty"><div class="emptyIcon">🎪</div><div class="emptyText">등록된 행사가 없습니다</div></div>`;
  h+=`</div>`;
  return h;
}

// ══════════════════════════════════════════════
// NOTICE MODAL
// ══════════════════════════════════════════════
function openNotice(id){
  const n=notices.find(x=>x.id===id);if(!n)return;
  document.getElementById('nmTitle').textContent=n.title;
  document.getElementById('nmMeta').textContent=n.date+(n.pinned?' · 📌 고정':'');
  document.getElementById('nmBody').textContent=n.content||'';
  document.getElementById('noticeModal').style.display='flex';
}
function closeNoticeModal(){document.getElementById('noticeModal').style.display='none';}

// ══════════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════════
function render(){
  let h='';
  if(page==='home')h=pgHome();
  else if(page==='subjects')h=pgSubjects();
  else if(page==='favorites')h=pgFavorites();
  else if(page==='recent')h=pgRecent();
  else if(page==='events')h=pgEvents();
  document.getElementById('main').innerHTML=h;
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init(){
  loadState();
  await loadLinks();
  render();
  upMP();
}
init();
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Go America! Season 2</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a3a5c;
  --gold: #f5a623;
  --green: #3ab870;
  --red: #e84040;
  --blue: #4a9eff;
  --sky: #ddeeff;
  --land: #c8dbb0;
  --land-hover: #f5a623;
  --active-fill: #3ab870;
  --inactive: #d0e4d0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #0d1f35;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NAV BAR ── */
.navbar {
  background: #0a1828;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  position: sticky;
  top: 0;
  z-index: 60;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 20px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.4);
  font-family: 'Fredoka One', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s;
  letter-spacing: .3px;
}
.nav-btn:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); }
.nav-btn.active { background: var(--navy); color: #fff; }
.nav-divider { width: 1px; height: 18px; background: rgba(255,255,255,.1); margin: 0 2px; }

/* ── HEADER ── */
header {
  background: var(--navy);
  padding: 18px 24px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  border-bottom: 4px solid;
  border-image: repeating-linear-gradient(90deg,#f5a623 0,#f5a623 20%,#e84040 20%,#e84040 40%,#fff 40%,#fff 60%,#3ab870 60%,#3ab870 80%,#4a9eff 80%,#4a9eff 100%) 1;
}
header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.03) 20px,rgba(255,255,255,.03) 40px);
  pointer-events: none;
}
.header-left { position: relative; z-index: 1; }
.season-pill {
  display: inline-block;
  background: var(--gold);
  color: var(--navy);
  font-family: 'Fredoka One', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 2px;
  padding: 2px 12px;
  border-radius: 20px;
  margin-bottom: 4px;
}
.header-title {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(1.3rem, 4vw, 2rem);
  color: #fff;
  line-height: 1.1;
}
.header-title span { color: var(--gold); }
.header-sub { font-size: 0.75rem; color: rgba(255,255,255,.55); margin-top: 3px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }

.progress-pill {
  position: relative; z-index: 1;
  background: rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 10px 18px;
  text-align: center;
  flex-shrink: 0;
}
.pp-count {
  font-family: 'Fredoka One', sans-serif;
  font-size: 1.6rem;
  color: var(--green);
  line-height: 1;
}
.pp-label { font-size: 0.68rem; color: rgba(255,255,255,.5); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

/* ── MAP WRAPPER ── */
.map-wrapper {
  position: relative;
  background: radial-gradient(ellipse at 50% 40%, #1a3d6b 0%, #0d1f35 70%);
  padding: 20px 10px 10px;
  overflow: hidden;
}
.map-wrapper::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}

.map-container {
  max-width: 900px;
  margin: 0 auto;
  position: relative;
}

/* ── SVG MAP ── */
#usa-map {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,.5));
}

/* all states default */
.state-path {
  fill: #2a4a6a;
  stroke: #4a7a9b;
  stroke-width: 0.8;
  transition: fill .2s, filter .2s, transform .2s;
  cursor: default;
}

/* inactive mission states (slightly brighter) */
.state-mission {
  fill: #3d6b4a;
  stroke: #5a9b6a;
  stroke-width: 1;
  cursor: pointer;
  transition: fill .2s, filter .2s;
}
.state-mission:hover {
  fill: var(--gold);
  filter: drop-shadow(0 0 10px rgba(245,166,35,.7));
}

/* completed */
.state-mission.completed {
  fill: var(--green);
  stroke: #5adf8a;
}
.state-mission.completed:hover {
  fill: #5adf8a;
  filter: drop-shadow(0 0 10px rgba(58,184,112,.7));
}

/* ── LEGEND ── */
.legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 10px 0 16px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  color: rgba(255,255,255,.55);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── TOOLTIP ── */
.map-tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--navy);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 8px 14px;
  z-index: 20;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .15s, transform .15s;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.map-tooltip.show { opacity: 1; transform: translateY(0); }
.tt-name { font-family: 'Fredoka One', sans-serif; font-size: 1rem; color: #fff; }
.tt-mission { font-size: 0.72rem; color: var(--gold); font-weight: 700; margin-top: 2px; }

/* ── STATE CARDS ROW ── */
.cards-section {
  background: #132030;
  padding: 16px 14px 24px;
}
.cards-label {
  font-family: 'Fredoka One', sans-serif;
  font-size: 0.9rem;
  color: rgba(255,255,255,.35);
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 12px;
}
.cards-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 6px;
  scrollbar-width: thin;
  scrollbar-color: #2a4a6a transparent;
  max-width: 900px;
  margin: 0 auto;
}
.cards-scroll::-webkit-scrollbar { height: 4px; }
.cards-scroll::-webkit-scrollbar-track { background: transparent; }
.cards-scroll::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 4px; }

.mini-card {
  flex-shrink: 0;
  background: #1a3a5c;
  border-radius: 14px;
  padding: 12px 14px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .2s;
  width: 130px;
  text-align: center;
}
.mini-card:hover { border-color: var(--gold); transform: translateY(-3px); }
.mini-card.completed { border-color: var(--green); background: #1a3a2a; }
.mc-emoji { font-size: 1.6rem; margin-bottom: 4px; }
.mc-name { font-family: 'Fredoka One', sans-serif; font-size: 0.85rem; color: #fff; line-height: 1.2; }
.mc-mission { font-size: 0.62rem; color: rgba(255,255,255,.45); font-weight: 700; text-transform: uppercase; margin-top: 3px; }
.mc-stamp {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px dashed rgba(255,255,255,.2);
  margin: 6px auto 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem;
  color: rgba(255,255,255,.2);
}
.completed .mc-stamp {
  border-color: var(--green);
  background: var(--green);
  color: #fff;
  border-style: solid;
}

/* ── POPUP MODAL ── */
.popup-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(5,15,30,.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
  backdrop-filter: blur(6px);
}
.popup-overlay.open { display: flex; }

.popup {
  background: var(--navy);
  border-radius: 24px;
  max-width: 420px;
  width: 100%;
  overflow: hidden;
  animation: popIn .25s ease;
  box-shadow: 0 20px 80px rgba(0,0,0,.5);
  position: relative;
}
@keyframes popIn { from { transform: scale(.85) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

.popup-hero {
  padding: 28px 24px 20px;
  background: linear-gradient(135deg, #1a3a5c, #0d2540);
  text-align: center;
  position: relative;
}
.popup-hero::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--green));
}
.popup-close {
  position: absolute; top: 12px; right: 14px;
  background: rgba(255,255,255,.1);
  border: none; border-radius: 50%;
  width: 30px; height: 30px;
  color: #fff; font-size: 0.9rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.popup-close:hover { background: rgba(255,255,255,.2); }
.popup-emoji { font-size: 3.8rem; margin-bottom: 10px; display: block; }
.popup-state { font-family: 'Fredoka One', sans-serif; font-size: 1.8rem; color: #fff; }
.popup-feature { font-size: 0.78rem; color: rgba(255,255,255,.5); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.popup-body { padding: 20px 22px 22px; }

.mission-box {
  background: rgba(245,166,35,.12);
  border: 2px solid rgba(245,166,35,.3);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.mb-icon { font-size: 1.8rem; flex-shrink: 0; }
.mb-label { font-size: 0.65rem; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.mb-mission { font-family: 'Fredoka One', sans-serif; font-size: 1.2rem; color: #fff; }

.words-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.word-chip {
  background: rgba(255,255,255,.1);
  color: #fff;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.15);
}

.sentences-box {
  background: rgba(58,184,112,.1);
  border-left: 3px solid var(--green);
  border-radius: 0 10px 10px 0;
  padding: 10px 14px;
  margin-bottom: 18px;
}
.sb-label { font-size: 0.62rem; color: var(--green); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.sb-sentence { font-family: 'Fredoka One', sans-serif; font-size: 1rem; color: #fff; line-height: 1.5; }

.popup-fact { font-size: 0.82rem; color: rgba(255,255,255,.5); line-height: 1.7; margin-bottom: 18px; }

.btn-stamp {
  width: 100%; padding: 15px;
  border: none; border-radius: 14px;
  background: var(--navy);
  border: 2px solid rgba(255,255,255,.15);
  color: #fff;
  font-family: 'Fredoka One', sans-serif;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-stamp:hover { background: rgba(255,255,255,.08); border-color: var(--gold); }
.btn-stamp.done { background: var(--green); border-color: var(--green); }
.btn-stamp.done:hover { background: #5adf8a; }

.btn-curriculum {
  width: 100%; padding: 11px;
  border: 2px solid rgba(74,158,255,.4);
  border-radius: 12px;
  background: rgba(74,158,255,.1);
  color: #4a9eff;
  font-family: 'Fredoka One', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  margin-top: 8px;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-decoration: none;
}
.btn-curriculum:hover { background: rgba(74,158,255,.2); border-color: #4a9eff; }
.btn-undo-sm {
  width: 100%; padding: 8px;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  background: transparent;
  color: rgba(255,255,255,.35);
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: all .2s;
}
.btn-undo-sm:hover { color: var(--red); border-color: var(--red); }

/* confetti */
.confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 300; overflow: hidden; }
.cp { position: absolute; top: -10px; border-radius: 2px; animation: cfFall linear forwards; }
@keyframes cfFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

@media (max-width: 500px) {
  .header-title { font-size: 1.2rem; }
  .legend { gap: 10px; }
}
</style>

      <g id="state-labels" font-family="Fredoka One, sans-serif" text-anchor="middle" pointer-events="none">

        <text x="348" y="130" font-size="7" fill="rgba(255,255,255,.7)">SD</text>
        <text x="688" y="133" font-size="6.5" fill="rgba(255,255,255,.7)">ME</text>
        <text x="610" y="232" font-size="6" fill="rgba(255,255,255,.7)">NC</text>
        <text x="460" y="84" font-size="7" fill="rgba(255,255,255,.7)">WI</text>
        <text x="255" y="173" font-size="7" fill="rgba(255,255,255,.7)">CO</text>
        <text x="349" y="214" font-size="7" fill="rgba(255,255,255,.7)">OK</text>
        <text x="255" y="127" font-size="7" fill="rgba(255,255,255,.7)">WY</text>
        <text x="434" y="182" font-size="7" fill="rgba(255,255,255,.7)">MO</text>
        <text x="589" y="160" font-size="6" fill="rgba(255,255,255,.7)">PA</text>
      </g>

      <!-- Alaska & Hawaii labels -->
      <text x="100" y="525" font-family="Fredoka One" font-size="9" fill="rgba(255,255,255,.25)" text-anchor="middle">ALASKA</text>
      <text x="230" y="555" font-family="Fredoka One" font-size="9" fill="rgba(255,255,255,.25)" text-anchor="middle">HAWAII</text>
      <text x="100" y="538" font-family="Fredoka One" font-size="6" fill="rgba(255,255,255,.15)" text-anchor="middle">(Season 1)</text>
    </svg>

    <!-- Tooltip -->
    <div class="map-tooltip" id="mapTooltip">
      <div class="tt-name" id="ttName"></div>
      <div class="tt-mission" id="ttMission"></div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3d6b4a"></div>Mission State</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Completed ✓</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Hover to explore</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a4a6a"></div>Other states</div>
  </div>
</div>

<!-- MINI CARDS SCROLL -->
<div class="cards-section">
  <div class="cards-label">🗺️ Your 12 Mission States</div>
  <div class="cards-scroll" id="cardsScroll"></div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup">
    <div class="popup-hero">
      <button class="popup-close" id="popupClose">✕</button>
      <span class="popup-emoji" id="pEmoji"></span>
      <div class="popup-state" id="pState"></div>
      <div class="popup-feature" id="pFeature"></div>
    </div>
    <div class="popup-body">
      <div class="mission-box">
        <div class="mb-icon" id="pActIcon"></div>
        <div>
          <div class="mb-label">🎯 Mission</div>
          <div class="mb-mission" id="pMission"></div>
        </div>
      </div>
      <div class="words-row" id="pWords"></div>
      <div class="sentences-box">
        <div class="sb-label">💬 Key Sentences</div>
        <div id="pSentences"></div>
      </div>
      <div class="popup-fact" id="pFact"></div>
      <button class="btn-stamp" id="btnStamp"></button>
      <a class="btn-curriculum" id="btnCurriculum" href="#">📚 View Lesson Plan</a>
      <button class="btn-undo-sm" id="btnUndoSm">↩ Undo stamp</button>
    </div>
  </div>
</div>

<div class="confetti-layer" id="confettiLayer"></div>

<script>
const STATES = [
  { id:"arizona",       name:"Arizona",        emoji:"🏜️", feature:"Grand Canyon",    mission:"Canyon Explorer",    actIcon:"🏃", words:["canyon","big","deep","rock"],          sentences:["It's big!","Let's explore!"],    fact:"The Grand Canyon is over 1 mile deep — Earth's most dramatic 'history book,' with each rock layer telling a story from millions of years ago." },
  { id:"georgia",       name:"Georgia",        emoji:"🥤", feature:"Coca-Cola",       mission:"Soda Lab",           actIcon:"🧪", words:["soda","sweet","mix","drink"],          sentences:["Mix it!","I like soda!"],        fact:"Coca-Cola was invented in Atlanta, Georgia in 1886. It's now sold in over 200 countries worldwide!" },
  { id:"michigan",      name:"Michigan",       emoji:"🚗", feature:"Car Industry",    mission:"Build a Car",        actIcon:"✂️", words:["car","wheel","go","fast"],             sentences:["Let's go!","My car is fast!"],   fact:"Detroit is called the Motor City. Henry Ford invented the assembly line here, changing how everything is made." },
  { id:"tennessee",     name:"Tennessee",      emoji:"🎸", feature:"Country Music",   mission:"Band Performance",   actIcon:"🎵", words:["music","guitar","sing","play"],        sentences:["Let's play music!","I can sing!"],fact:"Nashville has been the capital of country music since the Grand Ole Opry opened in 1925." },
  { id:"south_dakota",  name:"South Dakota",   emoji:"🗿", feature:"Mount Rushmore",  mission:"President Carving",  actIcon:"🫙", words:["face","big","stone","head"],           sentences:["Big face!","Look at this!"],     fact:"Mount Rushmore has 4 presidential faces carved in granite — each face is about 60 feet tall!" },
  { id:"maine",         name:"Maine",          emoji:"🦞", feature:"Lobster Fishing", mission:"Fishing Mission",    actIcon:"🎣", words:["fish","catch","water","crab"],         sentences:["Catch it!","I got it!"],         fact:"Maine produces about 80% of all US lobsters. Lobsters can live for over 100 years!" },
  { id:"north_carolina",name:"North Carolina", emoji:"✈️", feature:"Wright Brothers", mission:"Paper Airplane Lab", actIcon:"📄", words:["fly","up","down","plane"],             sentences:["Fly high!","Go up!"],            fact:"The Wright Brothers flew the world's first airplane at Kitty Hawk, NC in 1903. It lasted just 12 seconds!" },
  { id:"wisconsin",     name:"Wisconsin",      emoji:"🧀", feature:"Cheese Capital",  mission:"Cheese Maker",       actIcon:"🎭", words:["cheese","milk","yummy","make"],        sentences:["I like cheese!","It's yummy!"],  fact:"Wisconsin makes more cheese than any other US state — over 600 varieties. Locals are called 'cheeseheads'!" },
  { id:"colorado",      name:"Colorado",       emoji:"⛰️", feature:"Rocky Mountains", mission:"Mountain Hiking",    actIcon:"🥾", words:["mountain","climb","high","up"],        sentences:["Climb up!","So high!"],          fact:"Colorado has 58 mountains over 14,000 feet tall, known as 'fourteeners.' Hiking all of them is a popular challenge!" },
  { id:"oklahoma",      name:"Oklahoma",       emoji:"🤠", feature:"Cowboy Culture",  mission:"Lasso Game",         actIcon:"🤸", words:["rope","catch","throw","cowboy"],       sentences:["Catch it!","Throw it!"],         fact:"Oklahoma has more Native American tribes than any other state — 39 federally recognized tribes!" },
  { id:"wyoming",       name:"Wyoming",        emoji:"🌋", feature:"Yellowstone",     mission:"Geyser Science",     actIcon:"🔬", words:["hot","water","up","boom"],             sentences:["Water goes up!","So hot!"],      fact:"Old Faithful erupts every 44–125 minutes, shooting water 185 feet high. Yellowstone has more geysers than anywhere on Earth!" },
  { id:"missouri",      name:"Missouri",       emoji:"🌉", feature:"Gateway Arch",    mission:"Giant Arch Builder", actIcon:"🧱", words:["arch","big","build","tall"],           sentences:["Let's build it!","So tall!"],    fact:"The Gateway Arch in St. Louis is 630 feet tall — taller than the Washington Monument!" },
];

// State map: id → data
const STATE_MAP = {};
STATES.forEach(s => STATE_MAP[s.id] = s);

// Storage
let completed = (() => { try { return JSON.parse(localStorage.getItem('bigcat_s2') || '[]'); } catch { return []; } })();
function save() { try { localStorage.setItem('bigcat_s2', JSON.stringify(completed)); } catch {} }

// ── UPDATE UI ──
function updateAll() {
  // Header count
  document.getElementById('ppCount').textContent = completed.length + '/12';

  // SVG paths
  document.querySelectorAll('.state-mission').forEach(el => {
    const id = el.dataset.id;
    if (completed.includes(id)) {
      el.classList.add('completed');
    } else {
      el.classList.remove('completed');
    }
  });

  // Mini cards
  renderCards();
}

// ── MINI CARDS ──
function renderCards() {
  const scroll = document.getElementById('cardsScroll');
  scroll.innerHTML = '';
  STATES.forEach(s => {
    const done = completed.includes(s.id);
    const card = document.createElement('div');
    card.className = 'mini-card' + (done ? ' completed' : '');
    card.innerHTML = `
      <div class="mc-emoji">${s.emoji}</div>
      <div class="mc-name">${s.name}</div>
      <div class="mc-mission">${s.mission}</div>
      <div class="mc-stamp">${done ? '✓' : ''}</div>
    `;
    card.addEventListener('click', () => openPopup(s.id));
    scroll.appendChild(card);
  });
}

// ── TOOLTIP ──
const tooltip = document.getElementById('mapTooltip');
let tooltipVisible = false;

document.querySelectorAll('.state-mission').forEach(el => {
  const id = el.dataset.id;
  const s = STATE_MAP[id];
  if (!s) return;

  el.addEventListener('mouseenter', (e) => {
    document.getElementById('ttName').textContent = s.emoji + ' ' + s.name;
    document.getElementById('ttMission').textContent = '🎯 ' + s.mission;
    tooltip.classList.add('show');
    tooltipVisible = true;
    positionTooltip(e);
  });
  el.addEventListener('mousemove', positionTooltip);
  el.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
    tooltipVisible = false;
  });
  el.addEventListener('click', () => openPopup(id));
  // Touch
  el.addEventListener('touchend', (e) => {
    e.preventDefault();
    openPopup(id);
  });
});

function positionTooltip(e) {
  const mapRect = document.querySelector('.map-container').getBoundingClientRect();
  let x = e.clientX - mapRect.left + 12;
  let y = e.clientY - mapRect.top - 60;
  if (x + 200 > mapRect.width) x -= 220;
  if (y < 0) y = 10;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// ── POPUP ──
let activeId = null;

function openPopup(id) {
  const s = STATE_MAP[id];
  if (!s) return;
  activeId = id;
  const done = completed.includes(id);

  document.getElementById('pEmoji').textContent = s.emoji;
  document.getElementById('pState').textContent = s.name;
  document.getElementById('pFeature').textContent = s.feature;
  document.getElementById('pActIcon').textContent = s.actIcon;
  document.getElementById('pMission').textContent = s.mission;
  document.getElementById('pFact').textContent = s.fact;
  document.getElementById('btnCurriculum').href = `missions.html?state=${id}#curriculum`;

  const wordsEl = document.getElementById('pWords');
  wordsEl.innerHTML = s.words.map(w => `<span class="word-chip">${w}</span>`).join('');

  const sentEl = document.getElementById('pSentences');
  sentEl.innerHTML = s.sentences.map(sen => `<div class="sb-sentence">"${sen}"</div>`).join('');

  const btn = document.getElementById('btnStamp');
  const undo = document.getElementById('btnUndoSm');
  if (done) {
    btn.textContent = '✅ Mission Complete!';
    btn.className = 'btn-stamp done';
    undo.style.display = 'block';
  } else {
    btn.textContent = '🎯 Complete This Mission!';
    btn.className = 'btn-stamp';
    undo.style.display = 'none';
  }

  document.getElementById('popupOverlay').classList.add('open');
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('open');
  activeId = null;
}

document.getElementById('btnStamp').addEventListener('click', () => {
  if (!activeId || completed.includes(activeId)) return;
  completed.push(activeId);
  save(); updateAll(); openPopup(activeId); confettiSmall();
});

document.getElementById('btnUndoSm').addEventListener('click', () => {
  if (!activeId) return;
  completed = completed.filter(id => id !== activeId);
  save(); updateAll(); openPopup(activeId);
});

document.getElementById('popupClose').addEventListener('click', closePopup);
document.getElementById('popupOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('popupOverlay')) closePopup();
});

// ── CONFETTI ──
function confettiSmall() {
  const box = document.getElementById('confettiLayer');
  const colors = ['#f5a623','#3ab870','#e84040','#4a9eff','#a259ff','#fff'];
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'cp';
      p.style.cssText = `left:${20+Math.random()*60}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.4+Math.random()*1.6}s;animation-delay:${Math.random()*.3}s;`;
      box.appendChild(p);
      setTimeout(() => p.remove(), 3500);
    }, i * 25);
  }
}

// ── INIT ──
updateAll();
</script>
</body>
</html>
